<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <main class="page">
      <section class="game" aria-label="Tic Tac Toe Game">
        <h1 class="game__title">Tic Tac Toe</h1>
        <p class="game__subtitle">Classic two-player mode</p>

        <h2 class="board__title" aria-live="polite">X's Turn</h2>

        <div class="scoreboard" aria-label="Scoreboard">
          <div class="scoreboard__item">
            <span class="scoreboard__label">X Wins</span>
            <span class="scoreboard__value" id="score-x">0</span>
          </div>
          <div class="scoreboard__item">
            <span class="scoreboard__label">Draws</span>
            <span class="scoreboard__value" id="score-draw">0</span>
          </div>
          <div class="scoreboard__item">
            <span class="scoreboard__label">O Wins</span>
            <span class="scoreboard__value" id="score-o">0</span>
          </div>
        </div>

        <div class="board__wrapper" role="grid" aria-label="Tic Tac Toe board">
          <button class="board__square" data-index="0" aria-label="Cell 1"></button>
          <button class="board__square" data-index="1" aria-label="Cell 2"></button>
          <button class="board__square" data-index="2" aria-label="Cell 3"></button>
          <button class="board__square" data-index="3" aria-label="Cell 4"></button>
          <button class="board__square" data-index="4" aria-label="Cell 5"></button>
          <button class="board__square" data-index="5" aria-label="Cell 6"></button>
          <button class="board__square" data-index="6" aria-label="Cell 7"></button>
          <button class="board__square" data-index="7" aria-label="Cell 8"></button>
          <button class="board__square" data-index="8" aria-label="Cell 9"></button>
        </div>

        <div class="game__actions">
          <button class="restart" id="restart-round">Restart Round</button>
          <button class="restart restart--alt" id="reset-score">Reset Score</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
